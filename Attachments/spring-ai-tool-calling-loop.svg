<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="590" viewBox="0 0 1120 590">
  <style>.title{font:700 29px Arial;fill:#1f2937}.box{rx:14;stroke-width:2.5}.h{font:700 17px Arial;fill:#111827}.t{font:14px Arial;fill:#374151}.arrow{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect width="1120" height="590" fill="#fff"/>
  <text x="560" y="45" text-anchor="middle" class="title">ToolCallAdvisor ReAct 循环源码图</text>
  <rect x="45" y="90" width="290" height="88" class="box" fill="#d0ebff" stroke="#1971c2"/><text x="190" y="122" text-anchor="middle" class="h">校验 Prompt.options</text><text x="190" y="148" text-anchor="middle" class="t">必须是 ToolCallingChatOptions</text><text x="190" y="168" text-anchor="middle" class="t">否则抛 IllegalArgumentException</text>
  <rect x="415" y="90" width="290" height="88" class="box" fill="#fff3bf" stroke="#e67700"/><text x="560" y="122" text-anchor="middle" class="h">复制 options</text><text x="560" y="148" text-anchor="middle" class="t">internalToolExecutionEnabled(false)</text><text x="560" y="168" text-anchor="middle" class="t">Advisor 接管工具循环</text>
  <rect x="785" y="90" width="290" height="88" class="box" fill="#ebfbee" stroke="#2f9e44"/><text x="930" y="122" text-anchor="middle" class="h">chain.copy(this).nextCall</text><text x="930" y="148" text-anchor="middle" class="t">跳过当前 ToolCallAdvisor</text><text x="930" y="168" text-anchor="middle" class="t">后续 Advisor + ChatModel 执行</text>
  <rect x="150" y="280" width="330" height="96" class="box" fill="#f3d9fa" stroke="#9c36b5"/><text x="315" y="314" text-anchor="middle" class="h">ChatResponse.hasToolCalls()</text><text x="315" y="342" text-anchor="middle" class="t">无 tool call: 结束循环</text><text x="315" y="364" text-anchor="middle" class="t">有 tool call: 进入执行器</text>
  <rect x="640" y="280" width="330" height="96" class="box" fill="#ffe3e3" stroke="#c92a2a"/><text x="805" y="314" text-anchor="middle" class="h">DefaultToolCallingManager</text><text x="805" y="342" text-anchor="middle" class="t">匹配 ToolCallback</text><text x="805" y="364" text-anchor="middle" class="t">Observation 包裹 toolCallback.call</text>
  <rect x="290" y="455" width="540" height="98" class="box" fill="#f1f3f5" stroke="#495057"/><text x="560" y="488" text-anchor="middle" class="h">构造下一轮 instructions</text><text x="560" y="516" text-anchor="middle" class="t">previous messages + AssistantMessage(toolCalls) + ToolResponseMessage(tool results)</text><text x="560" y="538" text-anchor="middle" class="t">returnDirect=true 则直接返回工具结果</text>
  <path d="M335 134 H415" class="arrow"/><path d="M705 134 H785" class="arrow"/><path d="M930 178 C920 235 760 265 480 315" class="arrow"/><path d="M480 328 H640" class="arrow"/><path d="M805 376 C780 420 690 440 560 455" class="arrow"/><path d="M560 455 C355 420 260 270 415 178" class="arrow"/>
</svg>
