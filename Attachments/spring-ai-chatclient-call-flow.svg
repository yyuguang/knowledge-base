<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <style>.title{font:700 29px Arial;fill:#1f2937}.box{rx:14;stroke-width:2.5}.h{font:700 17px Arial;fill:#111827}.t{font:14px Arial;fill:#374151}.arrow{stroke:#64748b;stroke-width:2.2;fill:none;marker-end:url(#arrow)}</style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker></defs>
  <rect width="1200" height="560" fill="#fff"/>
  <text x="600" y="45" text-anchor="middle" class="title">ChatClient call()/stream() 源码执行流</text>
  <rect x="35" y="95" width="250" height="86" class="box" fill="#d0ebff" stroke="#1971c2"/><text x="160" y="125" text-anchor="middle" class="h">ChatClient.builder(chatModel)</text><text x="160" y="150" text-anchor="middle" class="t">DefaultChatClientBuilder</text><text x="160" y="170" text-anchor="middle" class="t">保存 defaultRequest</text>
  <rect x="335" y="95" width="250" height="86" class="box" fill="#e7f5ff" stroke="#1971c2"/><text x="460" y="125" text-anchor="middle" class="h">prompt()</text><text x="460" y="150" text-anchor="middle" class="t">copy defaultRequest</text><text x="460" y="170" text-anchor="middle" class="t">追加本次 user/system/tools</text>
  <rect x="635" y="95" width="250" height="86" class="box" fill="#d0ebff" stroke="#1971c2"/><text x="760" y="125" text-anchor="middle" class="h">call()/stream()</text><text x="760" y="150" text-anchor="middle" class="t">buildAdvisorChain()</text><text x="760" y="170" text-anchor="middle" class="t">临时追加终端 Model Advisor</text>
  <rect x="935" y="95" width="250" height="86" class="box" fill="#e7f5ff" stroke="#1971c2"/><text x="1060" y="125" text-anchor="middle" class="h">DefaultChatClientUtils</text><text x="1060" y="150" text-anchor="middle" class="t">合成 Prompt + ChatOptions</text><text x="1060" y="170" text-anchor="middle" class="t">生成 ChatClientRequest</text>
  <rect x="110" y="300" width="300" height="92" class="box" fill="#ebfbee" stroke="#2f9e44"/><text x="260" y="330" text-anchor="middle" class="h">DefaultAroundAdvisorChain</text><text x="260" y="356" text-anchor="middle" class="t">OrderComparator.sort</text><text x="260" y="378" text-anchor="middle" class="t">Deque.pop 消费式执行</text>
  <rect x="450" y="300" width="300" height="92" class="box" fill="#fff3bf" stroke="#e67700"/><text x="600" y="330" text-anchor="middle" class="h">ChatClient Observation</text><text x="600" y="356" text-anchor="middle" class="t">AI_CHAT_CLIENT</text><text x="600" y="378" text-anchor="middle" class="t">记录 advisors / stream / format</text>
  <rect x="790" y="300" width="300" height="92" class="box" fill="#ffe3e3" stroke="#c92a2a"/><text x="940" y="330" text-anchor="middle" class="h">ChatModelCall/StreamAdvisor</text><text x="940" y="356" text-anchor="middle" class="t">终端调用 ChatModel.call/stream</text><text x="940" y="378" text-anchor="middle" class="t">返回 ChatClientResponse</text>
  <path d="M285 138 H335" class="arrow"/><path d="M585 138 H635" class="arrow"/><path d="M885 138 H935" class="arrow"/><path d="M1060 181 C1020 255 880 285 410 330" class="arrow"/><path d="M410 346 H450" class="arrow"/><path d="M750 346 H790" class="arrow"/>
</svg>
